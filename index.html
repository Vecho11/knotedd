<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>KNOWTEDD</title>
     <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="utility-container">
        <div>
            <p class="main-text">KNOWTEDD</p>
        </div>
        <div class="toggle-container">
            <button id="toggle-btn"><i class="fa-solid fa-moon"></i></button>
            <button class="plus-btn"><i class="fa-solid fa-plus"></i></button>
        </div>
    </div>

    <div class="main-container">
        <div id="data-container"></div>
    </div>
    <div class="modal hidden">
        <div class="modal-container">
            <form id="form">
                <textarea type="text" rows="6" id="input" required>
                </textarea>
                <button type="submit" id="add-btn">ADD</button>
            </form>
            <div class="cancel-container">
                <button class="cancel-btn">CANCEL</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
